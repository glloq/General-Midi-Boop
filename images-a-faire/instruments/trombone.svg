<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Trombone - GM 57 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Embouchure -->
    <rect x="56" y="2" width="4" height="8" rx="1" fill="#D4A843" stroke="#B8960F" stroke-width="0.8"/>
    <ellipse cx="58" cy="1" rx="5" ry="2.5" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Tube interieur (manche, gauche) -->
    <rect x="56" y="10" width="4" height="80" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Coulisse exterieure (tube droit) -->
    <rect x="68" y="10" width="4" height="86" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Barres de liaison de la coulisse -->
    <rect x="56" y="20" width="16" height="3" rx="1" fill="#D4A843" stroke="#B8960F" stroke-width="0.8"/>

    <!-- U-bend de la coulisse (bas) -->
    <path d="M 56 90 C 56 100, 62 104, 72 104 C 78 104, 72 100, 72 96" fill="none" stroke="#D4A843" stroke-width="5"/>
    <path d="M 56 90 C 56 100, 62 104, 72 104 C 78 104, 72 100, 72 96" fill="none" stroke="#B8960F" stroke-width="1.5"/>

    <!-- Tube retour (du U vers le pavillon) -->
    <rect x="76" y="10" width="4" height="50" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Coude vers le pavillon -->
    <path d="M 78 10 C 78 4, 82 2, 86 4 L 86 8" fill="none" stroke="#D4A843" stroke-width="5"/>
    <path d="M 78 10 C 78 4, 82 2, 86 4 L 86 8" fill="none" stroke="#B8960F" stroke-width="1.5"/>

    <!-- Tube du pavillon -->
    <rect x="84" y="8" width="4" height="60" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Pavillon -->
    <path d="
      M 84 68
      C 78 76, 72 88, 70 98
      C 68 108, 78 114, 88 114
      C 98 114, 108 108, 106 98
      C 104 88, 98 76, 92 68
    " fill="#D4A843" stroke="#B8960F" stroke-width="1.5"/>

  </g>
</svg>
