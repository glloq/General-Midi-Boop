    <circle cx="29" cy="40" r="2.5" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
    <circle cx="36" cy="40" r="2.5" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
