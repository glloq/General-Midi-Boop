    <line x1="42" y1="58" x2="70" y2="58" stroke="#222" stroke-width="1"/>
    <line x1="42" y1="66" x2="70" y2="66" stroke="#222" stroke-width="1"/>
    <line x1="42" y1="74" x2="70" y2="74" stroke="#222" stroke-width="1"/>
    <line x1="42" y1="82" x2="70" y2="82" stroke="#222" stroke-width="1"/>
