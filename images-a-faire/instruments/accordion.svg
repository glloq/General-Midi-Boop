    <rect x="72" y="36" width="4" height="4" rx="0.5" fill="#111"/>
    <rect x="72" y="52" width="4" height="4" rx="0.5" fill="#111"/>
    <rect x="72" y="60" width="4" height="4" rx="0.5" fill="#111"/>
