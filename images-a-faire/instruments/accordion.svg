    <rect x="72" y="40" width="6" height="6" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
    <rect x="72" y="48" width="6" height="6" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
    <rect x="72" y="56" width="6" height="6" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
    <rect x="72" y="64" width="6" height="6" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
    <rect x="72" y="72" width="6" height="6" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
    <rect x="72" y="80" width="6" height="6" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>
