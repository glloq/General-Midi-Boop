    <circle cx="36" cy="90" r="2.5" fill="#F5F5F5" stroke="#CCC" stroke-width="0.5"/>

    <!-- Sangles -->
    <path d="M 82 16 C 86 10, 90 8, 90 14" fill="none" stroke="#5C4A0E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 82 112 C 86 118, 90 120, 90 114" fill="none" stroke="#5C4A0E" stroke-width="2" stroke-linecap="round"/>

