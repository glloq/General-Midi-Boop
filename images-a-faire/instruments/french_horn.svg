<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Cor d'harmonie - GM 60 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Embouchure -->
    <rect x="30" y="26" width="10" height="4" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="0.8"/>
    <ellipse cx="29" cy="28" rx="3" ry="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Tube d'entree (va vers l'enroulement) -->
    <path d="M 40 28 C 44 28, 46 32, 46 36" fill="none" stroke="#D4A843" stroke-width="4"/>
    <path d="M 40 28 C 44 28, 46 32, 46 36" fill="none" stroke="#B8960F" stroke-width="1"/>

    <!-- Enroulement principal (cercle) -->
    <circle cx="64" cy="64" r="28" fill="none" stroke="#D4A843" stroke-width="6"/>
    <circle cx="64" cy="64" r="28" fill="none" stroke="#B8960F" stroke-width="1.5"/>

    <!-- Enroulement interieur -->
    <circle cx="64" cy="64" r="18" fill="none" stroke="#D4A843" stroke-width="4"/>
    <circle cx="64" cy="64" r="18" fill="none" stroke="#B8960F" stroke-width="1"/>

    <!-- 3 palettes (rotors) en haut -->
    <circle cx="52" cy="42" r="4" fill="#E8C84A" stroke="#B8960F" stroke-width="1"/>
    <circle cx="64" cy="38" r="4" fill="#E8C84A" stroke="#B8960F" stroke-width="1"/>
    <circle cx="76" cy="42" r="4" fill="#E8C84A" stroke="#B8960F" stroke-width="1"/>

    <!-- Pavillon (grand, pointe vers le bas-droite) -->
    <path d="
      M 86 78
      C 92 86, 98 96, 102 106
      C 106 116, 96 122, 86 118
      C 76 114, 72 104, 76 94
      C 80 86, 84 80, 86 78
    " fill="#D4A843" stroke="#B8960F" stroke-width="1.5"/>

  </g>
</svg>
