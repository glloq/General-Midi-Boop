<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Clarinette - GM 71 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Bec -->
    <path d="M 62 2 L 60 10 L 68 10 L 66 2 Z" fill="#1A1A1A" stroke="#111" stroke-width="1"/>

    <!-- Barillet -->
    <rect x="59" y="10" width="10" height="10" rx="3" fill="#1A1A1A" stroke="#333" stroke-width="1"/>

    <!-- Corps superieur (bois noir) -->
    <rect x="60" y="20" width="8" height="40" rx="3" fill="#1A1A1A" stroke="#333" stroke-width="1"/>

    <!-- Corps inferieur -->
    <rect x="60" y="60" width="8" height="40" rx="3" fill="#1A1A1A" stroke="#333" stroke-width="1"/>

    <!-- Bagues argent (jonctions) -->
    <rect x="59" y="19" width="10" height="2" rx="1" fill="#C0C0C0"/>
    <rect x="59" y="59" width="10" height="2" rx="1" fill="#C0C0C0"/>
    <rect x="59" y="99" width="10" height="2" rx="1" fill="#C0C0C0"/>

    <!-- Pavillon (legere evasure en bas) -->
    <path d="
      M 60 100
      L 58 108
      C 56 114, 58 118, 64 118
      C 70 118, 72 114, 70 108
      L 68 100
    " fill="#1A1A1A" stroke="#333" stroke-width="1"/>

    <!-- Clefs argent (cote gauche) -->
    <circle cx="56" cy="30" r="3" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <circle cx="56" cy="42" r="3" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <circle cx="56" cy="54" r="3" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <circle cx="56" cy="68" r="3" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <circle cx="56" cy="80" r="3" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <circle cx="56" cy="92" r="3" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>

    <!-- Tiges -->
    <line x1="56" y1="30" x2="60" y2="30" stroke="#999" stroke-width="0.8"/>
    <line x1="56" y1="42" x2="60" y2="42" stroke="#999" stroke-width="0.8"/>
    <line x1="56" y1="54" x2="60" y2="54" stroke="#999" stroke-width="0.8"/>
    <line x1="56" y1="68" x2="60" y2="68" stroke="#999" stroke-width="0.8"/>
    <line x1="56" y1="80" x2="60" y2="80" stroke="#999" stroke-width="0.8"/>
    <line x1="56" y1="92" x2="60" y2="92" stroke="#999" stroke-width="0.8"/>

    <!-- Trous de doigts (cote droit) -->
    <circle cx="72" cy="36" r="2" fill="#333" stroke="#555" stroke-width="0.5"/>
    <circle cx="72" cy="48" r="2" fill="#333" stroke="#555" stroke-width="0.5"/>
    <circle cx="72" cy="74" r="2" fill="#333" stroke="#555" stroke-width="0.5"/>
    <circle cx="72" cy="86" r="2" fill="#333" stroke="#555" stroke-width="0.5"/>

  </g>
</svg>
