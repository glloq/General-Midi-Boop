<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Harmonica - GM 22 -->
  <g transform="rotate(30, 64, 64)">

    <!-- Corps principal -->
    <rect x="14" y="46" width="100" height="36" rx="4" fill="#C0C0C0" stroke="#888" stroke-width="2"/>

    <!-- Plaque superieure -->
    <rect x="16" y="48" width="96" height="14" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Plaque inferieure -->
    <rect x="16" y="66" width="96" height="14" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Trous de souffle (10) -->
    <rect x="22" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="32" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="42" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="52" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="62" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="72" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="82" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="92" y="52" width="6" height="6" rx="1" fill="#333"/>
    <rect x="102" y="52" width="6" height="6" rx="1" fill="#333"/>

    <!-- Numeros des trous -->
    <text x="25" y="77" font-size="5" fill="#333" font-family="sans-serif">1</text>
    <text x="45" y="77" font-size="5" fill="#333" font-family="sans-serif">3</text>
    <text x="65" y="77" font-size="5" fill="#333" font-family="sans-serif">5</text>
    <text x="85" y="77" font-size="5" fill="#333" font-family="sans-serif">7</text>
    <text x="104" y="77" font-size="5" fill="#333" font-family="sans-serif">9</text>

  </g>
</svg>
