# Captive-portal DNS hijack for the GMBoop hotspot
#
# Deployed to /etc/NetworkManager/dnsmasq-shared.d/gmboop-captive.conf by
# scripts/Install.sh. Picked up automatically by NetworkManager's embedded
# dnsmasq when (and only when) a connection in `ipv4.method=shared` is
# active — i.e. the hotspot. Has no effect on the WiFi-client side.
#
# `address=/#/10.42.0.1` resolves *every* DNS query (the wildcard `#`) to
# the hotspot gateway IP. Combined with the captive-portal HTTP middleware
# in src/api/middleware/captivePortal.js, this is enough to make iOS,
# Android, Windows and the major desktop browsers detect a captive portal
# the moment they associate, and surface the GMBoop UI in the OS sign-in
# overlay without the user having to type an IP address.
address=/#/10.42.0.1
